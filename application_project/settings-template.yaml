# most of the settings can be changed in this file, however don't forget that train, test, inference, model
# and dataset are set from the command-line arguments

# i downloaded the dataset from https://www.cs.toronto.edu/%7Ekriz/cifar.html
cifar10_data_paths:
  train_paths: # must be a list
    - "/home/jesse/datasets/cifar-10-binary/cifar-10-batches-bin/data_batch_1.bin"
    - "/home/jesse/datasets/cifar-10-binary/cifar-10-batches-bin/data_batch_2.bin"
    - "/home/jesse/datasets/cifar-10-binary/cifar-10-batches-bin/data_batch_3.bin"
    - "/home/jesse/datasets/cifar-10-binary/cifar-10-batches-bin/data_batch_4.bin"
    - "/home/jesse/datasets/cifar-10-binary/cifar-10-batches-bin/data_batch_5.bin"
  test_paths: # must be a list
    - "/home/jesse/datasets/cifar-10-binary/cifar-10-batches-bin/test_batch.bin"
  inference_data:
    inference_path: "/home/jesse/datasets/cifar10_inference_imgs"
  meta_data:
    meta_path: "/home/jesse/datasets/cifar-10-binary/cifar-10-batches-bin/batches.meta.txt"

cifar10_model_paths:
  save_path: "/home/jesse/code/cv_project_cpp/application_project/weights"
  inference_name: "resnet_cifar10" # you can leave out the formatting like .pth, it is automatically added for model names
  test_name: "resnet_cifar10"
  work_name: "working"

cifar10_train_settings:
  dataset_info:
    image_size: 32
    num_classes: 10
    num_channels: 3
    mean: [0.4914, 0.4822, 0.4465] # credit: https://www.kaggle.com/code/abdelrahmanhesham601/resnet-18-fine-tuning-on-cifar-10
    standard_deviation: [0.247, 0.243, 0.261]
  batch_sizes:
    train: 256
    val: 256
    test: 256
  multiprocessing:
    num_workers: 4 # cores to use for multiprocessing
    async: false # async transfers to vram


# ---------------------------------------------------------------------------------------------------------------------------------


# i downloaded the dataset from https://www.kaggle.com/datasets/hojjatk/mnist-dataset
mnist_data_paths:
  train_data:
    train_imgs: "/home/jesse/datasets/mnist/train-images.idx3-ubyte"
    train_labels: "/home/jesse/datasets/mnist/train-labels.idx1-ubyte"
  test_data:
    test_imgs: "/home/jesse/datasets/mnist/t10k-images.idx3-ubyte"
    test_labels: "/home/jesse/datasets/mnist/t10k-labels.idx1-ubyte"
  inference_data:
    inference_imgs: "/home/jesse/datasets/mnist_inference_imgs"
 
mnist_model_paths:
    save_path: "/home/jesse/code/cv_project_cpp/application_project/weights"
    inference_name: "lenet" # you can leave out the formatting like .pth, it is automatically added for model names
    test_name: "lenet"
    work_name: "working"
  
mnist_train_settings:
  dataset_info:
    image_size: 28
    num_classes: 10
    num_channels: 1
    mean: [0.1307] # credit: https://www.digitalocean.com/community/tutorials/writing-lenet5-from-scratch-in-python 
    standard_deviation: [0.3081]
  batch_sizes:
    train: 128
    val: 128
    test: 128
  multiprocessing:
    num_workers: 4 # cores to use for multiprocessing
    async: false # async transfers to vram


# ---------------------------------------------------------------------------------------------------------------------------------


# resnet options (change the actual model in models/resnet.h)
resnet_imgresz: 224

#lenet options (change the actual model in models/lenet.h)
lenet_imgresz: 32

database_path: "/home/jesse/code/cv_project_cpp/application_project/experiments.db"

general_settings:
  loop:
    min_epochs: 1
    max_epochs: 10
    validation_interval: 1 # epoch % x == 0 ? validate : not
    early_stop_counter: 6 # not improved in a row to trigger early stop
    amp: false # not implemented yet
  optimiser:
    learning_rate: 0.001
    weight_decay: 0.0005
    warmup_length: 1 # epochs
    plateau_scheduler_activation_delay: 10 # epochs
